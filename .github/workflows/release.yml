name: Publish to npm (with provenance)

# Verified n8n community nodes MUST be published from CI with an npm provenance
# statement (required since 2026-05-01) — not from a local machine.
# Trigger: create a GitHub Release (or run manually). Requires repo secret NPM_TOKEN
# (an npm "Automation" access token from npmjs.com → Access Tokens).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # --ignore-scripts: a transitive devDep (isolated-vm, via n8n-workflow) needs
      # native compilation we don't require — we only use n8n-workflow for types.
      - run: npm ci --ignore-scripts

      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
